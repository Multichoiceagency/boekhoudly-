services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - fiscalflow

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    networks:
      - fiscalflow

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    networks:
      - fiscalflow

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fiscalflow
      POSTGRES_USER: fiscalflow
      POSTGRES_PASSWORD: fiscalflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fiscalflow

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - fiscalflow

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fiscalflow

volumes:
  postgres_data:
  minio_data:

networks:
  fiscalflow:
    driver: bridge
